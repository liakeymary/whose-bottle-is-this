<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Describe the Object! 🔎</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2c3e50;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            color: white;
        }
        h1 { color: #f1c40f; margin-bottom: 5px; text-shadow: 2px 2px #000; text-align: center; }
        p { color: #ecf0f1; margin-bottom: 25px; font-size: 16px; text-align: center; }
        
        /* 메인 퀴즈 카드 스타일 */
        .card-container {
            width: 90%;
            max-width: 450px;
            aspect-ratio: 3 / 4;
            perspective: 1000px;
            cursor: pointer;
            margin-bottom: 25px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        /* flipped 클래스가 붙으면 뒤집어짐 */
        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }
        
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 30px;
            border: 4px solid #fff;
        }
        
        /* 카드 앞면: 묘사 질문 텍스트 */
        .card-front {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .question-title {
            font-size: 24px;
            font-weight: 900;
            background: rgba(0,0,0,0.2);
            padding: 5px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .description-text {
            font-size: 22px;
            font-weight: bold;
            line-height: 1.8;
            text-align: center;
            word-break: keep-all;
        }
        .tap-hint {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            animation: blink 1.5s infinite;
        }
        
        /* 카드 뒷면: 정답 이미지 및 텍스트 */
        .card-back {
            background-color: white;
            color: #333;
            transform: rotateY(180deg);
            border-color: #38ef7d;
        }
        .card-back img {
            width: 80%;
            height: 60%;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 10px;
        }
        .answer-text {
            font-size: 28px;
            font-weight: 900;
            color: #2c3e50;
            border-bottom: 3px solid #38ef7d;
            padding-bottom: 5px;
        }
        
        /* 다음 카드 버튼 */
        .next-btn {
            background-color: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 50px;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .next-btn:hover { background-color: #f39c12; transform: translateY(-2px); }
        .next-btn:active { transform: translateY(1px); }

        @keyframes blink {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Guess the Object! 🤔</h1>
    <p>영어로 된 설명을 읽고 어떤 물건인지 맞춰보세요. 카드를 누르면 정답이 보입니다멍!</p>
    
    <!-- 메인 퀴즈 카드 -->
    <div class="card-container" id="quizCard" onclick="flipCard()">
        <div class="card-inner">
            <!-- 카드 앞면 (힌트 문장) -->
            <div class="card-front">
                <div class="question-title">What is this?</div>
                <div class="description-text" id="descText">힌트 로딩 중...</div>
                <div class="tap-hint">👇 Tap to check the answer!</div>
            </div>
            <!-- 카드 뒷면 (정답 이미지) -->
            <div class="card-back">
                <img id="ansImg" src="" alt="answer">
                <div class="answer-text" id="ansText">정답</div>
            </div>
        </div>
    </div>
    
    <!-- 다음 버튼 -->
    <button class="next-btn" onclick="nextQuestion()">Next Card ➡️</button>

<script>
    // 5학년 단원 연계 물건 8개 설명 데이터 (색깔, 모양, 크기, 특징 활용)
    const quizData = [
        {
            desc: "It is round.<br>It is black and white.<br>We can kick it.",
            text: "Soccer ball",
            img: "soccer ball.jpg"
        },
        {
            desc: "It is a big book.<br>We can draw pictures here.<br>We use it in art class.",
            text: "Sketchbook",
            img: "sketchbook.jpg"
        },
        {
            desc: "It is small and square.<br>It has many papers.<br>We can write on it.",
            text: "Notebook",
            img: "notebook.jpg"
        },
        {
            desc: "It is made of glass or plastic.<br>We can put water in it.<br>We drink from it.",
            text: "Bottle",
            img: "bottle.jpg"
        },
        {
            desc: "It is made of wood.<br>It has six strings.<br>It makes beautiful music.",
            text: "Guitar",
            img: "guitar.jpg"
        },
        {
            desc: "We wear them on our feet.<br>They are comfortable.<br>We wear them when we run.",
            text: "Sneakers",
            img: "sneakers.jpg"
        },
        {
            desc: "It looks like a mushroom.<br>We use it on rainy days.<br>It keeps us dry.",
            text: "Umbrella",
            img: "umbrella.jpg"
        },
        {
            desc: "They are made of glass.<br>We wear them on our eyes.<br>They help us see better.",
            text: "Glasses",
            img: "glasses.jpg"
        }
    ];

    let currentQuiz = null;
    const cardContainer = document.getElementById('quizCard');

    // 카드 뒤집기 토글 함수
    function flipCard() {
        cardContainer.classList.toggle('flipped');
    }

    // 다음 문제 세팅 함수
    function nextQuestion() {
        // 우선 카드를 다시 앞면으로 돌려놓기
        cardContainer.classList.remove('flipped');
        
        // 앞면이 완전히 돌아가는 시간(0.3초) 뒤에 새로운 문제를 출제
        setTimeout(() => {
            // 랜덤으로 문제 뽑기
            const randomIndex = Math.floor(Math.random() * quizData.length);
            currentQuiz = quizData[randomIndex];
            
            // 화면 데이터 변경
            document.getElementById('descText').innerHTML = currentQuiz.desc;
            document.getElementById('ansText').innerText = currentQuiz.text;
            document.getElementById('ansImg').src = currentQuiz.img;
        }, 300);
    }

    // 게임 시작 시 첫 번째 문제 출제
    nextQuestion();
</script>

</body>
</html>
